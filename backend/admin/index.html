<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roman Agency — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__logo">R</div>
      <div class="sidebar__brand-name">ROMAN<br><span>AGENCY</span></div>
    </div>

    <nav class="sidebar__nav">
      <button class="nav-item is-active" data-tab="media">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        Media
      </button>
      <button class="nav-item" data-tab="faq">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v1m0 7h.01M9.5 10a2.5 2.5 0 015 0c0 1.5-2.5 2.5-2.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        FAQ
      </button>
      <button class="nav-item" data-tab="settings">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.5"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.5"/></svg>
        Settings
      </button>
      <button class="nav-item" data-tab="subscribers">
        <svg viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Subscribers
      </button>
    </nav>

    <div class="sidebar__footer">
      <span id="sidebar-user"></span>
      <button id="logout-btn" class="btn btn--ghost btn--sm">Logout</button>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────── -->
  <main class="main">
    <!-- Header -->
    <header class="topbar">
      <div class="topbar__left">
        <h1 class="topbar__title" id="page-title">Media Manager</h1>
      </div>
      <div class="topbar__right">
        <div class="status-badge" id="publish-version-badge">
          Live: not published
        </div>
        <div class="status-badge" id="api-status">
          <span class="status-dot"></span> Connected
        </div>
      </div>
    </header>

    <!-- ── Tab: Media ── -->
    <section class="tab-panel is-active" data-panel="media">
      <div class="panel-toolbar">
        <div class="toolbar-left">
          <select id="media-section-filter" class="select">
            <option value="">All Sections</option>
            <option value="hero">Hero</option>
            <option value="proof-campaign">Proof — Campaign</option>
            <option value="proof-system">Proof — System</option>
            <option value="proof-bm">Proof — Business Managers</option>
            <option value="proof-sigma">Proof — SiGMA World</option>
            <option value="proof-affiliate">Proof — Affiliate World</option>
            <option value="services">Services</option>
            <option value="resources">Resources</option>
            <option value="brand">Brand / Logo</option>
          </select>
        </div>
        <div class="toolbar-right" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;">
          <button class="btn btn--ghost" id="publish-preview-btn">Preview Publish</button>
          <button class="btn btn--primary" id="publish-btn">Publish Changes</button>
          <button class="btn btn--primary" id="upload-btn">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Upload Media
          </button>
        </div>
      </div>
      <div class="settings-grid" style="margin-bottom:20px;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="settings-group">
          <div class="settings-group__title">Publish Preview</div>
          <div id="publish-preview-box" class="footer-copy footer-copy--small">No preview generated yet.</div>
        </div>
        <div class="settings-group">
          <div class="settings-group__title">Publish History</div>
          <div id="publish-history-box" class="footer-copy footer-copy--small">No publish history yet.</div>
        </div>
      </div>
      <div class="media-grid" id="media-grid">
        <div class="empty-state" id="media-empty">
          <p>No media uploaded yet.</p>
          <button class="btn btn--primary" onclick="document.getElementById('upload-btn').click()">Upload first image</button>
        </div>
      </div>
    </section>

    <!-- ── Tab: FAQ ── -->
    <section class="tab-panel" data-panel="faq">
      <div class="panel-toolbar">
        <div class="toolbar-left">
          <select id="faq-lang-filter" class="select">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
          </select>
        </div>
        <button class="btn btn--primary" id="add-faq-btn">+ Add FAQ</button>
      </div>
      <div class="faq-list" id="faq-list">
        <div class="loading">Loading FAQs…</div>
      </div>
    </section>

    <!-- ── Tab: Settings ── -->
    <section class="tab-panel" data-panel="settings">
      <div class="settings-grid" id="settings-form">
        <div class="loading">Loading settings…</div>
      </div>
    </section>

    <!-- ── Tab: Subscribers ── -->
    <section class="tab-panel" data-panel="subscribers">
      <div class="panel-toolbar">
        <div class="toolbar-left">
          <span class="count-badge" id="sub-count">— subscribers</span>
        </div>
        <a href="#" id="export-csv-btn" class="btn btn--ghost">Export CSV</a>
      </div>
      <div class="table-wrap">
        <table class="table" id="subscribers-table">
          <thead>
            <tr><th>Email</th><th>Subscribed</th><th>Source</th><th></th></tr>
          </thead>
          <tbody id="subscribers-body">
            <tr><td colspan="4" class="loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- ── Upload Modal ──────────────────────────────── -->
  <div class="modal-overlay" id="upload-modal" hidden>
    <div class="modal">
      <div class="modal__header">
        <h2>Upload Media</h2>
        <button class="modal__close" id="upload-modal-close">✕</button>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label>Section *</label>
          <select id="upload-section" class="select">
            <option value="hero">Hero</option>
            <option value="proof-campaign">Proof — Campaign</option>
            <option value="proof-system">Proof — System</option>
            <option value="proof-bm">Proof — Business Managers</option>
            <option value="proof-sigma">Proof — SiGMA World</option>
            <option value="proof-affiliate">Proof — Affiliate World</option>
            <option value="services">Services</option>
            <option value="resources">Resources</option>
            <option value="brand">Brand / Logo</option>
          </select>
        </div>
        <div class="form-group">
          <label>Slot (optional — e.g. SD1, BM-1)</label>
          <input type="text" id="upload-slot" class="input" placeholder="Leave blank for auto-ID" />
        </div>
        <div class="form-group">
          <label>Alt Text</label>
          <input type="text" id="upload-alt" class="input" placeholder="Describe the image for SEO" />
        </div>
        <div class="form-group">
          <label>Caption (bold)</label>
          <input type="text" id="upload-caption" class="input" placeholder="e.g. $56,439" />
        </div>
        <div class="form-group">
          <label>Caption Sub</label>
          <input type="text" id="upload-caption-sub" class="input" placeholder="e.g. Total spend · 221 campaigns" />
        </div>
        <div class="form-group">
          <label>File * (max 5MB image / 50MB video)</label>
          <div class="drop-zone" id="drop-zone">
            <svg viewBox="0 0 24 24" fill="none" width="32" height="32"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <p>Drag & drop or <label for="upload-file" class="link">browse</label></p>
            <input type="file" id="upload-file" accept="image/*,video/mp4,video/webm" hidden />
            <div id="drop-preview" class="drop-preview" hidden></div>
          </div>
        </div>
        <div id="upload-error" class="form-error" hidden></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="upload-cancel">Cancel</button>
        <button class="btn btn--primary" id="upload-submit">
          <span id="upload-submit-text">Upload</span>
          <span class="spinner" id="upload-spinner" hidden></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── FAQ Edit Modal ────────────────────────────── -->
  <div class="modal-overlay" id="faq-modal" hidden>
    <div class="modal">
      <div class="modal__header">
        <h2 id="faq-modal-title">Add FAQ</h2>
        <button class="modal__close" id="faq-modal-close">✕</button>
      </div>
      <div class="modal__body">
        <input type="hidden" id="faq-edit-id" />
        <div class="form-group">
          <label>Language</label>
          <select id="faq-edit-lang" class="select">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
          </select>
        </div>
        <div class="form-group">
          <label>Question *</label>
          <input type="text" id="faq-edit-q" class="input" placeholder="Enter question…" />
        </div>
        <div class="form-group">
          <label>Answer *</label>
          <textarea id="faq-edit-a" class="textarea" rows="4" placeholder="Enter answer…"></textarea>
        </div>
        <div id="faq-error" class="form-error" hidden></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="faq-cancel">Cancel</button>
        <button class="btn btn--primary" id="faq-save">Save FAQ</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ─────────────────────────────────────── -->
  <div class="toast-stack" id="toast-stack"></div>

  <script src="./admin.js"></script>
</body>
</html>
